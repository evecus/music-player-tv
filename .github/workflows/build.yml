name: Build & Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g. 1.0.0)'
        required: false
        default: 'dev'

jobs:
  build:
    name: Build APKs (arm64 + arm32)
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. JDK 17 ────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Android SDK ───────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ── 4. Bootstrap gradle-wrapper.jar ──────────────────
      # gradle-wrapper.jar is a binary not committed to repo.
      # Install system Gradle via apt, then use it to generate
      # the wrapper jar at the pinned version. All subsequent
      # steps use ./gradlew as normal.
      - name: Bootstrap Gradle wrapper jar
        run: |
          set -e
          GRADLE_VERSION="8.4"

          echo "Installing system Gradle via apt..."
          sudo apt-get update -q
          sudo apt-get install -y gradle

          echo "System Gradle: $(gradle --version | head -1)"

          echo "Generating wrapper jar for Gradle $GRADLE_VERSION..."
          gradle wrapper \
            --gradle-version "$GRADLE_VERSION" \
            --distribution-type bin \
            --project-dir .

          echo "Wrapper jar ready:"
          ls -lh gradle/wrapper/gradle-wrapper.jar

          chmod +x gradlew

      # ── 5. Generate keystore ─────────────────────────────
      - name: Generate keystore
        run: |
          mkdir -p keystore
          if [ ! -f keystore/tvmusic.jks ]; then
            keytool -genkey -v \
              -keystore keystore/tvmusic.jks \
              -alias tvmusic \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storepass tvmusic123 \
              -keypass tvmusic123 \
              -dname "CN=TVMusic, OU=Dev, O=TVMusic, L=CN, S=CN, C=CN"
            echo "Keystore generated"
          else
            echo "Keystore already exists"
          fi

      # ── 6. Cache Gradle ──────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── 7. Build Release APKs ────────────────────────────
      - name: Build Release APKs
        run: ./gradlew assembleRelease --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4g"

      # ── 8. List built APKs ───────────────────────────────
      - name: List APK outputs
        run: |
          echo "=== Built APKs ==="
          find app/build/outputs/apk -name "*.apk" | sort
          echo "=== File sizes ==="
          find app/build/outputs/apk -name "*.apk" -exec du -sh {} \;

      # ── 9. Rename APKs ───────────────────────────────────
      - name: Rename APKs
        run: |
          mkdir -p release_apks
          ARM64=$(find app/build/outputs/apk/release -name "*arm64-v8a*" | head -1)
          [ -n "$ARM64" ] && cp "$ARM64" release_apks/TVMusic-arm64-v8a.apk && echo "arm64: $ARM64"
          ARM32=$(find app/build/outputs/apk/release -name "*armeabi-v7a*" | head -1)
          [ -n "$ARM32" ] && cp "$ARM32" release_apks/TVMusic-armeabi-v7a.apk && echo "arm32: $ARM32"
          ls -la release_apks/

      # ── 10. Upload artifacts ─────────────────────────────
      - name: Upload APKs as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TVMusic-APKs
          path: release_apks/*.apk
          retention-days: 30

      # ── 11. GitHub Release (tag only) ────────────────────
      - name: Get version from tag
        if: startsWith(github.ref, 'refs/tags/')
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          name: "TV音乐 ${{ steps.get_version.outputs.VERSION }}"
          body: |
            ## TV音乐播放器 ${{ steps.get_version.outputs.VERSION }}

            ### 下载
            | 文件 | 架构 | 适用 |
            |------|------|------|
            | `TVMusic-arm64-v8a.apk` | 64位 ARM | 现代 Android TV |
            | `TVMusic-armeabi-v7a.apk` | 32位 ARM | 旧款 Android TV |

            ### 安装
            ```bash
            adb install TVMusic-arm64-v8a.apk
            ```
          files: |
            release_apks/TVMusic-arm64-v8a.apk
            release_apks/TVMusic-armeabi-v7a.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── PR debug build ───────────────────────────────────────
  build-debug:
    name: Build Debug (PR check)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - uses: android-actions/setup-android@v3

      - name: Bootstrap Gradle wrapper jar
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gradle
          gradle wrapper --gradle-version "8.4" --distribution-type bin --project-dir .
          chmod +x gradlew

      - name: Generate keystore
        run: |
          mkdir -p keystore
          keytool -genkey -v \
            -keystore keystore/tvmusic.jks \
            -alias tvmusic \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass tvmusic123 -keypass tvmusic123 \
            -dname "CN=TVMusic, OU=Dev, O=TVMusic, L=CN, S=CN, C=CN"

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4g"

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: TVMusic-Debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7
